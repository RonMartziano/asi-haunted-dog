name: Deploy game to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build static site
        run: |
          mkdir -p _site
          # The game is fully self-contained (assets are embedded as base64),
          # so serving the single HTML file as index.html is enough.
          cp "asi-haunted-dog.html" _site/index.html
          cp "asi-haunted-dog.html" _site/asi-haunted-dog.html
          # Copy assets too, in case any relative fallback paths are used.
          if [ -d assets ]; then cp -r assets _site/assets; fi

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
